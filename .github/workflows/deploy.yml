name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: 🔍 Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test -- --run

  build-and-deploy:
    name: 🚀 Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t calculadora:latest .

      - name: Save Docker image
        run: docker save calculadora:latest | gzip > calculadora.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy image to server
        run: |
          scp -i ~/.ssh/deploy_key calculadora.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /tmp
            docker load -i calculadora.tar.gz
            rm calculadora.tar.gz

            cat > /tmp/calculadora-stack.yml << 'COMPOSE'
            version: "3.8"

            services:
              calculadora:
                image: calculadora:latest
                networks:
                  - network_public
                deploy:
                  mode: replicated
                  replicas: 1
                  update_config:
                    parallelism: 1
                    delay: 10s
                    order: start-first
                  labels:
                    - "traefik.enable=true"
                    - "traefik.http.routers.calculadora.rule=Host(`calculadora.nextagent.com.br`)"
                    - "traefik.http.routers.calculadora.entrypoints=websecure"
                    - "traefik.http.routers.calculadora.tls.certresolver=letsencryptresolver"
                    - "traefik.http.services.calculadora.loadbalancer.server.port=80"
                    - "traefik.http.routers.calculadora-http.rule=Host(`calculadora.nextagent.com.br`)"
                    - "traefik.http.routers.calculadora-http.entrypoints=web"

            networks:
              network_public:
                external: true
            COMPOSE

            docker stack deploy -c /tmp/calculadora-stack.yml calculadora
            rm /tmp/calculadora-stack.yml
            docker service update --force calculadora_calculadora
          EOF
